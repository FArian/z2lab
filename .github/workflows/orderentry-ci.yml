name: OrderEntry CI/CD

on:
  push:
    branches:
      - dev
    paths:
      - "frontend/orderentry/**"
      - ".github/workflows/orderentry-ci.yml"

  pull_request:
    branches:
      - dev
    paths:
      - "frontend/orderentry/**"
      - ".github/workflows/orderentry-ci.yml"

  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch (dev/test/master)"
        required: true
        default: "test"

permissions:
  contents: read

env:
  IMAGE_NAME: farian/orderentry

jobs:
  # =========================================================
  # 🧪 QUALITY JOB
  # =========================================================
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend/orderentry

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/orderentry/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        continue-on-error: true
        run: npm test --if-present

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_LAB_ORG_ID: zlz
          NEXT_PUBLIC_LAB_NAME: ZLZ Zentrallabor AG
          NEXT_PUBLIC_ORDER_SERVICE_TYPES: MIBI,ROUTINE,POC
          NEXT_PUBLIC_GLN_ENABLED: false
          NEXT_PUBLIC_SASIS_ENABLED: false

  # =========================================================
  # 🏷️ TAG JOB
  # ---------------------------------------------------------
  # Resolves branch + image tag exactly once; both build matrix
  # entries reuse the same outputs (avoids drift if branches differ).
  # =========================================================
  tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    needs: quality

    if: >
      github.event_name == 'push' && github.ref == 'refs/heads/dev' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      branch:  ${{ steps.branch.outputs.branch }}
      tag:     ${{ steps.vars.outputs.tag }}
      sha_tag: ${{ steps.vars.outputs.sha_tag }}

    steps:
      - name: Determine branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.target_branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        id: vars
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.branch }}"
          if [ "$BRANCH_NAME" = "master" ]; then
            TAG="latest"
          elif [ "$BRANCH_NAME" = "dev" ]; then
            TAG="dev"
          elif [ "$BRANCH_NAME" = "test" ]; then
            TAG="test"
          else
            TAG="$(echo "$BRANCH_NAME" | tr '/' '-' | tr '[:upper:]' '[:lower:]')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  # =========================================================
  # 🐳 DOCKER BUILD MATRIX
  # ---------------------------------------------------------
  # Builds each platform on its NATIVE runner (no QEMU).
  # SWC's native code crashed under QEMU emulation with SIGILL,
  # so amd64 → ubuntu-latest, arm64 → ubuntu-22.04-arm.
  # Each job pushes by-digest; the merge job below combines them.
  # =========================================================
  docker-build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: tag

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner:   ubuntu-latest
          - platform: linux/arm64
            runner:   ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/orderentry
          file:    ./frontend/orderentry/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ needs.tag.outputs.branch }}
            GIT_COUNT=${{ github.run_number }}
            NEXT_PUBLIC_LAB_ORG_ID=zlz
            NEXT_PUBLIC_LAB_NAME=ZLZ Zentrallabor AG
            NEXT_PUBLIC_ORDER_SERVICE_TYPES=MIBI,ROUTINE,POC
            NEXT_PUBLIC_GLN_ENABLED=false
            NEXT_PUBLIC_SASIS_ENABLED=false
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to:   type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          # Digest filenames vary per platform; namespacing prevents collisions.
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # =========================================================
  # 🔗 MERGE JOB
  # ---------------------------------------------------------
  # Combines per-platform digests into a single Docker manifest list
  # and tags it (e.g. `dev` / `test` / `latest`). Result is a
  # multi-arch image that `docker pull farian/orderentry:dev`
  # will resolve to the correct architecture automatically.
  # =========================================================
  docker-merge:
    name: Merge into multi-arch tag
    runs-on: ubuntu-latest
    needs: [tag, docker-build]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.tag }}
            #type=raw,value=${{ needs.tag.outputs.sha_tag }} # Optional: zusätzlich ein Tag mit Commit-SHA

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.tag }}